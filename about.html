<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机构概况 | A422 联邦共和国总局</title>
    <style>
        :root { --primary: #0f172a; --accent: #f59e0b; --text: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Inter", sans-serif; background: #fff; line-height: 1.8; }
        
        header { background: var(--primary); color: white; padding: 1.2rem 10%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.4rem; font-weight: 800; color: white; text-decoration: none; }
        .logo span { color: var(--accent); }

        .about-hero { background: #0f172a; color: white; padding: 100px 10%; text-align: center; }
        .about-hero h2 { font-size: 3rem; margin-bottom: 20px; }
        
        .content-section { max-width: 800px; margin: 80px auto; padding: 0 20px; }
        h3 { font-size: 1.8rem; margin: 40px 0 20px; color: var(--primary); border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }
        p { color: #475569; margin-bottom: 20px; font-size: 1.1rem; }
        .mission-quote { background: #f8fafc; padding: 30px; border-radius: 16px; border-left: 4px solid var(--accent); font-style: italic; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">A422<span>FEDERAL</span></a>
    </header>
    <section class="about-hero">
        <h2>追溯起源 · 铸就秩序</h2>
        <p>A422 联邦共和国总局成立于新纪元 0422 年</p>
    </section>
    <main class="content-section">
        <h3>机构使命</h3>
        <p>我们致力于通过最前沿的计算技术，消除行政层级中的信息不对称。在 A422 联邦，每一项决策都记录在不可篡改的协议之中。</p>
        <div class="mission-quote">
            “以科技之手，行正义之道，守护每一位联邦公民的数字权利。”
        </div>
        <h3>核心价值观</h3>
        <p>总局坚持以“透明、高效、不可追溯”为核心理念，建立了一套独立于传统官僚体系的自动化服务逻辑。我们相信，代码即法律，算法即公平。</p>
    </main>
</body>
</html>
