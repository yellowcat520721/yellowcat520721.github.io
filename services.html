<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政务服务 | A422 联邦共和国总局</title>
    <style>
        :root { --primary: #0f172a; --accent: #f59e0b; --text: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Inter", sans-serif; background: #f8fafc; color: var(--text); }
        
        header { background: var(--primary); color: white; padding: 1.2rem 10%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.4rem; font-weight: 800; color: white; text-decoration: none; }
        .logo span { color: var(--accent); }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        nav a:hover, nav a.active { color: white; }

        main { max-width: 1200px; margin: 60px auto; padding: 0 40px; }
        .page-header { margin-bottom: 50px; border-left: 5px solid var(--accent); padding-left: 20px; }
        h2 { font-size: 2.5rem; color: var(--primary); }

        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .service-card {
            background: white; padding: 40px; border-radius: 20px;
            border: 1px solid #e2e8f0; transition: all 0.3s ease;
        }
        .service-card:hover { transform: translateY(-10px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border-color: var(--accent); }
        .icon-box { width: 50px; height: 50px; background: #fef3c7; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; color: var(--accent); font-weight: bold; }
        h3 { margin-bottom: 12px; color: var(--primary); }
        p { color: #64748b; font-size: 0.95rem; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">A422<span>FEDERAL</span></a>
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html">机构</a></li>
                <li><a href="services.html" class="active">服务</a></li>
                <li><a href="login.html">登录</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="page-header">
            <h2>政务公开服务</h2>
            <p>基于数字身份的一站式公共事务受理平台</p>
        </div>
        <div class="services-grid">
            <div class="service-card">
                <div class="icon-box">ID</div>
                <h3>公民身份认证</h3>
                <p>在线签发及年审联邦电子公民 ID，支持跨星区身份互认。</p>
            </div>
            <div class="service-card">
                <div class="icon-box">TX</div>
                <h3>资产备案系统</h3>
                <p>基于联邦账本的资产登记与确权，确保个人财产神圣不可侵犯。</p>
            </div>
            <div class="service-card">
                <div class="icon-box">LS</div>
                <h3>法律援助接口</h3>
                <p>24小时在线的 AI 法律助手，为您解读联邦最新行政法案。</p>
            </div>
        </div>
    </main>
</body>
</html>
