<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A422联邦共和国总局 - 首页</title>
    <style>
        /* 终极方案：内联样式，无视缓存，强制生效 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            list-style: none; /* 彻底干掉那些黑点 */
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #f0f4f8;
            color: #2d3748;
            line-height: 1.6;
        }

        /* 顶部导航：庄严深蓝 */
        header {
            background-color: #1a3a5f;
            color: white;
            padding: 1.2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.2);
        }

        nav ul {
            display: flex;
            gap: 20px;
        }

        nav a {
            color: #e2e8f0;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover, nav a.active {
            color: #ffffff;
            border-bottom: 2px solid #ed8936;
        }

        /* 主体内容 */
        main {
            max-width: 1100px;
            margin: 50px auto;
            padding: 0 20px;
        }

        /* 英雄横幅区域 */
        .hero {
            background: linear-gradient(135deg, #1a3a5f 0%, #2c5282 100%);
            color: white;
            padding: 80px 40px;
            text-align: center;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .hero h2 {
            font-size: 2.8rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* 页脚 */
        footer {
            background-color: #2d3748;
            color: #cbd5e0;
            text-align: center;
            padding: 30px;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <header>
        <h1>A422联邦共和国总局</h1>
        <nav>
            <ul>
                <li><a href="index.html" class="active">首页</a></li>
                <li><a href="about.html">关于</a></li>
                <li><a href="services.html">服务</a></li>
                <li><a href="contact.html">联系</a></li>
                <li><a href="login.html">登录</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2>公正 · 透明 · 高效</h2>
            <p>数字化行政服务领航者，构建 A422 联邦共和国的美好未来</p>
        </section>
        
        <div style="margin-top: 40px; text-align: center; color: #718096;">
            <p>正在为您连接联邦安全网络...</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 A422联邦共和国总局 | 保护公民权利</p>
    </footer>
</body>
</html>
