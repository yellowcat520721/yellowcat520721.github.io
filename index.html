<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A422 联邦共和国总局 | 官方门户</title>
    <style>
        /* 现代政府风：极简、深邃、专业 */
        :root {
            --primary: #0f172a;    /* 深靛蓝 */
            --accent: #f59e0b;     /* 暖金 */
            --glass: rgba(255, 255, 255, 0.85);
            --text: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Inter", "Segoe UI", "PingFang SC", sans-serif;
            background: #f8fafc;
            background-image: radial-gradient(#cbd5e1 0.5px, transparent 0.5px); /* 微米网格底纹 */
            background-size: 24px 24px;
            color: var(--text);
            line-height: 1.6;
        }

        /* 磨砂玻璃导航栏 */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 1.2rem 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
        .logo span { color: var(--accent); }

        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a { 
            color: #94a3b8; 
            text-decoration: none; 
            font-size: 0.95rem; 
            font-weight: 500; 
            transition: all 0.3s; 
        }
        nav a:hover, nav a.active { color: white; }

        .btn-login {
            background: var(--accent);
            color: var(--primary) !important;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: 700;
        }

        /* 英雄视觉区 */
        main { max-width: 1200px; margin: 80px auto; padding: 0 40px; }

        .hero-section {
            position: relative;
            padding: 120px 60px;
            background: var(--primary);
            color: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        /* 右侧装饰圆 */
        .hero-section::after {
            content: "";
            position: absolute;
            top: -100px; right: -100px;
            width: 400px; height: 400px;
            background: linear-gradient(135deg, rgba(245,158,11,0.2) 0%, transparent 80%);
            border-radius: 50%;
        }

        .hero-content { position: relative; z-index: 1; max-width: 650px; }
        .hero-content h2 { font-size: 3.5rem; line-height: 1.1; margin-bottom: 24px; }
        .hero-content p { font-size: 1.25rem; color: #94a3b8; margin-bottom: 40px; }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 100px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        /* 统计卡片区 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-top: -60px;
            padding: 0 60px;
        }

        .stat-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 32px;
            border-radius: 20px;
            border: 1px solid white;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            text-align: center;
        }

        .stat-card h3 { font-size: 2.5rem; color: var(--primary); margin-bottom: 8px; }
        .stat-card p { color: #64748b; font-weight: 500; }

        footer {
            margin-top: 100px;
            padding: 40px;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            color: #94a3b8;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">A422<span>FEDERAL</span></div>
    <nav>
        <ul>
            <li><a href="index.html" class="active">政务首页</a></li>
            <li><a href="about.html">机构概况</a></li>
            <li><a href="services.html">公共服务</a></li>
            <li><a href="login.html" class="btn-login">安全登录</a></li>
        </ul>
    </nav>
</header>

<main>
    <section class="hero-section">
        <span class="badge">Official Governance Portal</span>
        <div class="hero-content">
            <h2>公正 · 透明<br>数字化重构未来</h2>
            <p>基于区块链技术的 A422 联邦政务系统，为全体公民提供更高效、更安全的行政响应。铸就联邦基石，共建数字契约。</p>
        </div>
    </section>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>99.9<span>%</span></h3>
            <p>在线审批率</p>
        </div>
        <div class="stat-card">
            <h3>24<span>hr</span></h3>
            <p>实时安全监控</p>
        </div>
        <div class="stat-card">
            <h3>0.0<span>ms</span></h3>
            <p>数据交换延迟</p>
        </div>
    </div>
</main>

<footer>
    &copy; 2026 A422联邦共和国总局 · 数字化转型办公室
</footer>

</body>
</html>
