<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - A422联邦共和国总局</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>A422联邦共和国总局</h1>
        <nav>
            <ul>
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html">关于</a></li>
                <li><a href="services.html">服务</a></li>
                <li><a href="contact.html" class="active">联系</a></li>
                <li><a href="login.html" class="login-btn">登录</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="content-section">
            <h2>联系我们</h2>
            <div class="contact-container">
                <div class="contact-info">
                    <h3>总局地址</h3>
                    <p>📍 A422联邦首都中心区1号政务大楼</p>
                    <h3>办公时间</h3>
                    <p>⏰ 周一至周五 8:30-17:30（节假日除外）</p>
                    <h3>联系方式</h3>
                    <p>📞 总机：+86-10-12345678</p>
                    <p>📧 邮箱：contact@a422.gov.cn</p>
                </div>
                <form class="contact-form">
                    <h3>留言咨询</h3>
                    <div class="form-group">
                        <input type="text" placeholder="姓名" required>
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="邮箱" required>
                    </div>
                    <div class="form-group">
                        <textarea placeholder="请输入您的留言..." rows="5" required></textarea>
                    </div>
                    <button type="submit">提交留言</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 A422联邦共和国总局 | 紧急求助：110</p>
    </footer>
</body>
